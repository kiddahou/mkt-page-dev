<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin:0; background:#eee; }
.controls { position:fixed; top:10px; left:10px; z-index:99; background:white; padding:10px; border-radius:8px; box-shadow:0 2px 10px rgba(0,0,0,.2); }
button { margin:2px; padding:6px 12px; cursor:pointer; }
#container { transform-origin: top left; }
</style>
</head>
<body>
<div class="controls">
  <button onclick="setZoom(0.05)">5%</button>
  <button onclick="setZoom(0.1)">10%</button>
  <button onclick="setZoom(0.15)">15%</button>
  <button onclick="setZoom(0.2)">20%</button>
  <button onclick="setZoom(0.3)">30%</button>
  <span id="info" style="margin-left:8px;font-size:12px;color:#666"></span>
</div>
<div id="container">
  <img src="admin-design.svg" style="display:block" />
</div>
<script>
function setZoom(z) {
  document.getElementById('container').style.transform = `scale(${z})`;
  document.getElementById('container').style.width = (8516*z)+'px';
  document.getElementById('container').style.height = (8776*z)+'px';
  document.getElementById('info').textContent = Math.round(z*100)+'%';
}
setZoom(0.1);
</script>
</body>
</html>
