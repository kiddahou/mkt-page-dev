<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飯店簡介 - HotelHR 旅宿人才</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #CC0000;
      --red-dark: #A80000;
      --red-light: #FFE5E5;
    }
    body { font-family: 'Noto Sans TC', sans-serif; }

    /* ── Sub-nav active underline ── */
    .subnav-item {
      position: relative;
      padding-bottom: 4px;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 12px 16px;
      white-space: nowrap;
      color: #555;
      transition: color .15s;
    }
    .subnav-item:hover { color: #111; }
    .subnav-item.active {
      color: var(--red);
      font-weight: 700;
    }
    .subnav-item.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 2px;
      background: var(--red);
      border-radius: 2px 2px 0 0;
    }

    /* ── Hero carousel ── */
    .carousel-track { display: flex; transition: transform 0.45s cubic-bezier(.25,.8,.25,1); }
    .carousel-slide  { min-width: 100%; position: relative; }

    /* ── Hero overlay gradient ── */
    .hero-overlay {
      background: linear-gradient(
        to right,
        rgba(0,0,0,.55) 0%,
        rgba(0,0,0,.35) 45%,
        rgba(0,0,0,.0)  100%
      );
    }

    /* ── Section title ── */
    .sec-title    { font-size: 1.25rem; font-weight: 700; color: #222; line-height: 1.3; }
    .sec-subtitle { font-size: 0.75rem; color: #aaa; margin-top: 2px; letter-spacing: .03em; }

    /* ── Product card ── */
    .product-card:hover .product-img { transform: scale(1.05); }

    /* ── News item ── */
    .news-item { border-bottom: 1px solid #f0f0f0; }
    .news-item:last-child { border-bottom: none; }

    /* ── Pagination dot ── */
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; cursor: pointer; transition: background .2s; }
    .dot.active { background: var(--red); }

    /* ── Badge ── */
    .badge-line {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--red); color: #fff;
      font-size: 0.78rem; font-weight: 700;
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      text-decoration: none; white-space: nowrap;
    }
    .badge-fb {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      background: #1877F2; color: #fff; cursor: pointer;
      transition: opacity .2s;
    }
    .badge-fb:hover { opacity: .85; }
    .badge-ig {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      background: radial-gradient(circle at 30% 110%, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: #fff; cursor: pointer; transition: opacity .2s;
    }
    .badge-ig:hover { opacity: .85; }

    /* ── Hours open ── */
    .hours-open { color: var(--red); }

    /* ── Hero badge pill ── */
    .hero-badge {
      display: inline-block;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.55);
      color: #fff;
      font-size: 0.78rem; font-weight: 600;
      padding: 5px 14px; border-radius: 20px;
      backdrop-filter: blur(4px);
    }

    /* ── Pagination ── */
    .page-btn {
      width: 32px; height: 32px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; cursor: pointer; transition: background .15s;
      color: #555;
    }
    .page-btn:hover { background: #f5f5f5; }
    .page-btn.active { background: var(--red); color: #fff; font-weight: 700; }

    /* ── Modal / Lightbox overlay ── */
    .fp-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      opacity: 0; visibility: hidden;
      transition: opacity .25s ease, visibility .25s ease;
    }
    .fp-overlay.open { opacity: 1; visibility: visible; }

    /* ── Shared modal box ── */
    .fp-box {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      transform: translateY(24px) scale(.96);
      transition: transform .32s cubic-bezier(.22,.8,.3,1);
    }
    .fp-overlay.open .fp-box { transform: translateY(0) scale(1); }

    /* ── Close button ── */
    .fp-close {
      position: absolute; top: 10px; right: 10px; z-index: 20;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(0,0,0,.45); color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; font-size: .95rem; line-height: 1;
      transition: background .15s;
    }
    .fp-close:hover { background: rgba(0,0,0,.75); }

    /* ── Lightbox scrollable body ── */
    .fp-scroll { overflow-y: auto; max-height: 88vh; }

    /* ── Product modal ── */
    #productModal .fp-box { max-width: 480px; }
    .pm-img-wrap {
      position: relative;
      aspect-ratio: 413/300;
      background: #f3f3f3;
      overflow: hidden;
    }
    .pm-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .pm-body { padding: 20px 24px 24px; }
    .pm-tag {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      color: var(--red); background: var(--red-light);
      margin-bottom: 10px;
    }
    .pm-name { font-size: 1.2rem; font-weight: 700; color: #1a1a1a; line-height: 1.35; }
    .pm-price { font-size: 1.35rem; font-weight: 800; color: var(--red); margin-top: 8px; }
    .pm-price-label { font-size: 0.8rem; color: #aaa; margin-top: 2px; }

    /* ── Article lightbox ── */
    #articleModal .fp-box { max-width: 680px; }
    .al-img-wrap {
      position: relative;
      aspect-ratio: 413/300;
      background: #f3f3f3;
      overflow: hidden;
      flex-shrink: 0;
    }
    .al-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .al-body { padding: 24px 28px 32px; }
    .al-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .al-tag {
      font-size: 0.72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      color: #fff; background: var(--red);
    }
    .al-date { font-size: 0.78rem; color: #999; }
    .al-title { font-size: 1.25rem; font-weight: 800; color: #1a1a1a; line-height: 1.4; margin-bottom: 14px; }
    .al-content { font-size: 0.9rem; color: #555; line-height: 1.85; white-space: pre-wrap; }
    .al-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 20px; padding: 10px 22px; border-radius: 8px;
      background: var(--red); color: #fff;
      font-size: 0.85rem; font-weight: 700; text-decoration: none;
      transition: background .15s;
    }
    .al-link:hover { background: var(--red-dark); }
  </style>
</head>
<body class="bg-white text-gray-800">

<!-- ════════════════════════════════════════════
     COMPANY SUB-NAV
════════════════════════════════════════════ -->
<div class="bg-white border-b sticky top-0 z-40">
  <div class="max-w-screen-xl mx-auto px-6">
    <div class="flex items-stretch justify-between">

<!-- ════════════════════════════════════════════
     MAIN CONTENT
════════════════════════════════════════════ -->
<main class="max-w-screen-xl mx-auto px-6 py-10">

  <!-- ── 公司資料 ── -->
  <section id="info" class="pb-10 border-b border-gray-100 mb-10">
    <div class="flex flex-col md:flex-row md:gap-12">

      <!-- Left label -->
      <div class="mb-5 md:mb-0 md:w-36 shrink-0">
        <p class="sec-title">公司資料</p>
        <p class="sec-subtitle">Information</p>
      </div>

      <!-- Right content -->
      <div class="flex flex-col sm:flex-row sm:gap-16 flex-1">
        <!-- 電話 -->
        <div class="mb-5 sm:mb-0 min-w-max">
          <p class="text-xs text-gray-400 mb-1">電話</p>
          <p id="infoPhone" class="text-sm font-medium text-gray-800">(02)7755-0920</p>
        </div>

        <!-- 營業時間 -->
        <div>
          <p class="text-xs text-gray-400 mb-1">營業時間</p>
          <p id="infoTodayStatus" class="text-sm hours-open font-medium mb-1">今日營業中</p>
          <div id="infoHoursBody">
            <p class="text-sm text-gray-600">星期一 ~ 四&nbsp;&nbsp;上午 11:00 - 下午 8:30</p>
            <p class="text-sm text-gray-600">星期五&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;上午 11:00 - 下午 8:30</p>
          </div>
          <a href="#" class="text-xs mt-2 inline-block" style="color:var(--red)">查看所有營業時間 +</a>
        </div>
      </div>
    </div>
  </section>

  <!-- ── 販售商品 ── -->
  <section id="services" class="mb-12">
    <div class="mb-6">
      <p id="productsSectionTitle" class="sec-title">販售商品</p>
      <p class="sec-subtitle">Goods</p>
    </div>

    <!-- Products grid: 4 columns -->
    <div id="productsGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-5"></div>

    <!-- Product pagination -->
    <div class="flex items-center justify-center gap-2 mt-7">
      <button class="text-gray-300 hover:text-gray-500 transition p-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <button class="text-gray-300 hover:text-gray-500 transition p-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </section>

  <!-- ── 最新消息 ── -->
  <section id="brand" class="mb-10">
    <div class="mb-6">
      <p id="newsSectionTitle" class="sec-title">最新消息</p>
      <p class="sec-subtitle">Latest News</p>
    </div>

    <!-- News list (full width) -->
    <div id="newsList" class="divide-y divide-gray-100"></div>

    <!-- Pagination -->
    <div class="flex items-center justify-center gap-1 mt-8 text-sm">
      <button class="page-btn text-gray-400">&lsaquo;</button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <span class="page-btn text-gray-400">…</span>
      <button class="page-btn">16</button>
      <button class="page-btn text-gray-400">&rsaquo;</button>
    </div>
    <p class="text-center text-xs text-gray-400 mt-2">1 / 5 頁</p>
  </section>

</main>

<!-- ════════════════════════════════════════════
     PRODUCT MODAL
════════════════════════════════════════════ -->

    <button class="fp-close" onclick="closeModal('productModal')" aria-label="關閉">✕</button>
    <div class="pm-img-wrap">
      <img id="pmImg" src="" alt="" />
    </div>
    <div class="pm-body">
      <div id="pmTag" class="pm-tag"></div>
      <p id="pmName" class="pm-name"></p>
      <p id="pmPrice" class="pm-price"></p>
      <p id="pmPriceLabel" class="pm-price-label">含稅售價</p>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     ARTICLE LIGHTBOX
════════════════════════════════════════════ -->
<div id="articleModal" class="fp-overlay" role="dialog" aria-modal="true">
  <div class="fp-box fp-scroll">
    <button class="fp-close" onclick="closeModal('articleModal')" aria-label="關閉">✕</button>

      <img id="alImg" src="" alt="" />

    <div class="al-body">
      <div class="al-meta">
        <span id="alTag" class="al-tag"></span>

// ── Helpers ───────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Load from Firebase & apply to DOM ──────────
async function loadAndRender() {
  let d = null;
  try {
    const res = await fetch(FIREBASE_URL);
    d = await res.json();
  } catch(e) {}

  applyData(d);
  renderProducts();
  renderNews();
}

// ── Render Products ───────────────────────────
function renderProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = hotel.products.map((p, idx) => `
    <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden hover:shadow-lg transition cursor-pointer group"
         onclick="openProduct(${idx})">
      <div class="overflow-hidden bg-gray-100 relative" style="aspect-ratio:413/300">
        <img src="${esc(p.img || p.image || '')}" alt="${esc(p.name)}"
             class="product-img absolute inset-0 w-full h-full object-cover transition duration-400" />
        <span class="absolute top-2 left-2 text-xs font-bold px-2 py-0.5 rounded-full bg-white/90 backdrop-blur"
              style="color:var(--red)">${esc(p.tag)}</span>
      </div>
      <div class="p-3">
        <p class="text-sm font-medium text-gray-800 leading-snug">${esc(p.name)}</p>
        ${p.price ? `<p class="text-sm font-bold mt-1" style="color:var(--red)">NT$ ${Number(p.price).toLocaleString()}</p>` : ''}
      </div>
    </div>
  `).join('');
}

// ── Render News ───────────────────────────────

  list.innerHTML = hotel.news.map((n, idx) => `
    <article class="news-item py-6 flex gap-5 cursor-pointer group" onclick="openArticle(${idx})">
      <div class="shrink-0 rounded-xl overflow-hidden" style="width:413px;aspect-ratio:413/300">

        <p class="text-xs text-gray-500 leading-relaxed line-clamp-3 flex-1">${esc(n.content || n.preview || '')}</p>
        <div class="flex items-center justify-between mt-3">
          <span class="text-xs font-medium" style="color:var(--red)">更多 +</span>

}

// ── Carousel (dynamic slide count) ────────────
function initCarousel() {
  const track = document.getElementById('carouselTrack');
  const dotsC = document.getElementById('carouselDots');
  let cur = 0, timer;

  function slides() { return track.querySelectorAll('.carousel-slide'); }
  function dots()   { return dotsC.querySelectorAll('.dot'); }

  function go(idx) {
    const total = slides().length;
    if (!total) return;
    cur = (idx + total) % total;
    track.style.transform = `translateX(-${cur * 100}%)`;
    dots().forEach((d, i) => d.classList.toggle('active', i === cur));
  }

  function start() { timer = setInterval(() => go(cur + 1), 4500); }
  function stop()  { clearInterval(timer); }

  document.getElementById('carouselPrev').addEventListener('click', () => { stop(); go(cur - 1); start(); });
  document.getElementById('carouselNext').addEventListener('click', () => { stop(); go(cur + 1); start(); });
  dotsC.addEventListener('click', e => {
    const dot = e.target.closest('.dot');
    if (!dot) return;
    const i = [...dots()].indexOf(dot);
    if (i >= 0) { stop(); go(i); start(); }
  });
  start();
}

// ── Sub-nav scroll-spy ────────────────────────
(function() {
  const items    = document.querySelectorAll('.subnav-item');
  const ids      = ['intro','info','services','brand'];
  const sections = ids.map(id => document.getElementById(id)).filter(Boolean);
  const navH     = 48;

  window.addEventListener('scroll', () => {
    let active = 0;
    sections.forEach((sec, i) => {
      if (window.scrollY >= sec.offsetTop - navH - 20) active = i;
    });
    items.forEach((el, i) => el.classList.toggle('active', i === active));
  }, { passive: true });
})();

// ── Modal / Lightbox ─────────────────────────
function openModal(id) {
  const el = document.getElementById(id);
  el.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('open');
  document.body.style.overflow = '';
}

// Close on overlay backdrop click
['productModal','articleModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) closeModal(id);
  });
});

// Close on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal('productModal');
    closeModal('articleModal');
  }
});

function openProduct(idx) {
  const p = hotel.products[idx];
  if (!p) return;
  document.getElementById('pmImg').src   = p.img || p.image || '';
  document.getElementById('pmImg').alt   = p.name || '';
  document.getElementById('pmTag').textContent  = p.tag  || '';
  document.getElementById('pmName').textContent = p.name || '';
  if (p.price) {
    document.getElementById('pmPrice').textContent      = 'NT$ ' + Number(p.price).toLocaleString();
    document.getElementById('pmPriceLabel').style.display = '';
  } else {
    document.getElementById('pmPrice').textContent      = '洽店家';
    document.getElementById('pmPriceLabel').style.display = 'none';
  }
  openModal('productModal');
}

function openArticle(idx) {
  const n = hotel.news[idx];
  if (!n) return;
  const img = document.getElementById('alImg');
  img.src = n.img || n.image || '';
  img.alt = n.title || '';
  document.getElementById('alImg').closest('.al-img-wrap').style.display =
    (n.img || n.image) ? '' : 'none';
  document.getElementById('alTag').textContent     = n.tag   || '';
  document.getElementById('alDate').textContent    = n.date  || '';
  document.getElementById('alTitle').textContent   = n.title || '';
  document.getElementById('alContent').textContent = n.content || n.preview || '';
  const link = document.getElementById('alLink');
  if (n.link && n.link !== '#') {
    link.href = n.link;
    link.style.display = 'inline-flex';
  } else {
    link.style.display = 'none';
  }
  openModal('articleModal');
}

// ── Init ──────────────────────────────────────
loadAndRender().then(() => initCarousel());

// ── Firebase 即時同步（EventSource SSE）─────────
(function() {
  const sseUrl = 'https://ai-project-b8885-default-rtdb.firebaseio.com/hotelData.json';
  let es;
  function connect() {
    es = new EventSource(sseUrl);
    es.addEventListener('put', e => {
      try {
        const payload = JSON.parse(e.data);
        const d = payload.data;
        if (!d) return;
        // 重新套用資料到 DOM
        applyData(d);
      } catch(err) {}
    });
    es.onerror = () => { es.close(); setTimeout(connect, 5000); };
  }
  connect();
})();

// ── 將資料套用到 DOM（供 loadAndRender + SSE 共用）─
function applyData(d) {
  if (!d) return;
  if (d.hero?.images?.length) {
    const track = document.getElementById('carouselTrack');
    track.innerHTML = d.hero.images.map((img, i) => `
      <div class="carousel-slide h-full">
        <img src="${esc(img.src)}" class="w-full h-full object-cover" alt="飯店環境 ${i+1}" />
      </div>`).join('');
    const dotsC = document.getElementById('carouselDots');
    dotsC.innerHTML = d.hero.images.map((_, i) =>
      `<div class="dot${i===0?' active':''}"></div>`).join('');
  }
  if (d.hero?.textEn)   document.getElementById('heroTextEn').textContent = d.hero.textEn;
  if (d.hero?.textZh)   document.getElementById('heroTextZh').textContent = d.hero.textZh;
  if (d.hero?.textDesc) document.getElementById('heroTextDesc').innerHTML = esc(d.hero.textDesc).replace(/\n/g,'<br>');
  if (d.hero?.badgeL)   document.getElementById('heroBadgeL').textContent = d.hero.badgeL;
  if (d.hero?.badgeR)   document.getElementById('heroBadgeR').textContent = d.hero.badgeR;
  if (d.brandName)      document.getElementById('companyName').textContent = d.brandName;
  const lineBtn = document.getElementById('lineBtn');
  if (lineBtn && d.cta) {
    if (d.cta.text)  document.getElementById('lineBtnText').textContent = d.cta.text;
    if (d.cta.url)   lineBtn.href = d.cta.url;
    if (d.cta.color) lineBtn.style.background = d.cta.color;
  }
  const fbBtn = document.getElementById('fbBtn');
  if (fbBtn) { if (d.fb) { fbBtn.href = d.fb; fbBtn.style.display=''; } else fbBtn.style.display='none'; }
  const igBtn = document.getElementById('igBtn');
  if (igBtn) { if (d.ig) { igBtn.href = d.ig; igBtn.style.display=''; } else igBtn.style.display='none'; }
  if (d.info?.todayStatus) {
    const el = document.getElementById('infoTodayStatus');
    const map = { open:'今日營業中', closed:'今日公休', holiday:'假日營業中' };
    el.textContent = map[d.info.todayStatus] || d.info.todayStatus;
    el.className = 'text-sm font-medium mb-1 ' + (d.info.todayStatus==='closed'?'text-gray-400':'hours-open');
  }
  if (d.info?.hours?.length)
    document.getElementById('infoHoursBody').innerHTML =
      d.info.hours.map(h=>`<p class="text-sm text-gray-600">${esc(h.day)}&nbsp;&nbsp;${esc(h.time)}</p>`).join('');
  if (d.products?.title) document.getElementById('productsSectionTitle').textContent = d.products.title;
  if (d.products?.items?.length) { hotel.products = d.products.items; renderProducts(); }
  if (d.articles?.title) document.getElementById('newsSectionTitle').textContent = d.articles.title;
  if (d.articles?.items?.length) {
    hotel.news = d.articles.items.map(a => ({
      id:a.id, tag:a.tag, title:a.title,
      date:(a.date||'').replace(/-/g,' / '),
      content:a.content||'', img:a.img||null, link:a.link||'#',
    }));
    renderNews();
  }
}
